display_name: CUA
short_description: Delegate computer-use tasks to an authenticated cloud desktop.
default_prompt: >-
  Use the CUA skill to run the user's computer-use task on a cloud desktop. Drive
  everything through scripts/cua.py: check auth, delegate the user's original
  objective, then watch until the outcome is completed, needs_input, failed, or
  cancelled. Relay any question to the user and submit their answer. Use
  result.text as the authoritative final result. Never ask for a token.
